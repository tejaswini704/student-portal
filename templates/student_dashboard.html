<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

.header {
    background: #2563eb;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.main {
    padding: 20px;
}

.card-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
}

/* GRID (IMPROVED ONLY) */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
}

/* FEATURE BOX (FIXED SIZE ONLY) */
.feature {
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    text-align: center;

    height: 105px;   /* FIXED SMALL SIZE */

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    font-size: 13px;

    transition: 0.3s;
}

.feature:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.12);
}

/* BUTTON INSIDE BOX */
.feature a {
    margin-top: 8px;
    text-decoration: none;
    background: #2563eb;
    color: white;
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 12px;
}

/* LOGOUT */
.logout {
    display: inline-block;
    margin-top: 15px;
    background: red;
    color: white;
    padding: 8px 15px;
    border-radius: 6px;
    text-decoration: none;
}

.logout:hover {
    background: darkred;
}

</style>

</head>

<body>

<div class="header">
    🎓 Student Dashboard
</div>

<div class="main">

    <!-- KEEP AS IT IS -->
    <div class="card-box">
        <h4>Welcome, {{ session['user'] }} 👋</h4>
        <p>Role: {{ session['role'] }}</p>
    </div>

    <!-- KEEP AS IT IS -->
    <div class="grid">

        <div class="feature">
            👤 Profile
            <a href="/profile">Open</a>
        </div>

        <div class="feature">
            📊 Marks
            <a href="/student_marks">Open</a>
        </div>

        <div class="feature">
            📢 Notice
        </div>

    </div>

    <!-- KEEP AS IT IS -->
    <a class="logout" href="/logout">Logout</a>

</div>

</body>
</html>
