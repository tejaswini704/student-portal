<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
}

/* NAV */
nav {
    background: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 15px rgba(0,0,0,0.08);
}

nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #2563eb;
    font-weight: 600;
    transition: 0.3s;
}

nav a:hover {
    color: #1d4ed8;
}

/* HERO */
.hero {
    height: 90vh;
    background: linear-gradient(135deg, #2563eb, #0f172a);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex-direction: column;
    padding: 20px;
}

.hero h1 {
    font-size: 55px;
    font-weight: bold;
}

.hero p {
    opacity: 0.85;
    margin-top: 10px;
}

/* BUTTONS */
.btns {
    margin-top: 25px;
}

.btn1, .btn2 {
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    display: inline-block;
}

/* LOGIN BUTTON */
.btn1 {
    background: white;
    color: #2563eb;
    margin-right: 10px;
}

.btn1:hover {
    background: #e2e8f0;
}

/* DASHBOARD BUTTON */
.btn2 {
    border: 2px solid white;
    background: transparent;
    color: white;
}

.btn2:hover {
    background: white;
    color: #2563eb;
}

/* FEATURES */
.features {
    padding: 80px 20px;
    text-align: center;
}

.card-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
    font-weight: 600;
}

.card-box:hover {
    transform: translateY(-8px);
    background: #f8fafc;
}

/* RESPONSIVE FIX */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 35px;
    }

    nav {
        flex-direction: column;
        text-align: center;
    }

    nav a {
        margin: 10px;
    }
}
</style>

</head>

<body>

<nav>
    <div><b>🎓 Student Portal</b></div>
    <div>
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/dashboard">Dashboard</a>
    </div>
</nav>

<div class="hero">

    <h1>Smart Student System</h1>
    <p>Manage students, records, and data in one place</p>

    <div class="btns">
        <a href="/login" class="btn1">Login</a>
        <a href="/dashboard" class="btn2">Dashboard</a>
    </div>

</div>

<div class="features">

    <h2 style="margin-bottom:40px;">Features</h2>

    <div class="container">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card-box">📊 Student Management</div>
            </div>

            <div class="col-md-4">
                <div class="card-box">🔍 Smart Search</div>
            </div>

            <div class="col-md-4">
                <div class="card-box">⚡ Fast System</div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
